# Список репозиториев с хуками
repos:
# Стандартные pre-commit хуки
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace      # Удаляет лишние пробелы в конце строк
    -   id: end-of-file-fixer       # Добавляет пустую строку в конец файла
    -   id: check-yaml              # Проверяет синтаксис YAML файлов
    -   id: check-added-large-files # Предотвращает коммит больших файлов
    -   id: check-ast              # Проверяет синтаксис Python файлов
    -   id: check-json             # Проверяет синтаксис JSON файлов
    -   id: debug-statements       # Проверяет наличие отладочных print/pdb statements

# Black - форматтер кода Python
-   repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
    -   id: black
        # Исключаем папки с автогенерируемым кодом и виртуальным окружением
        exclude: ^(migrations/|.venv/|venv/)
        args: [--line-length=88]  # Максимальная длина строки - 88 символов

# isort - сортировщик импортов
-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        exclude: ^(migrations/|.venv/|venv/)
        # Настройки совместимости с black и длины строки
        args: [--profile=black, --line-length=88]

# flake8 - линтер для проверки стиля кода
-   repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
    -   id: flake8
        exclude: ^(migrations/|.venv/|venv/)
        # Дополнительные плагины для расширения проверок
        additional_dependencies:
            - flake8-docstrings    # Проверка документации
            - flake8-bugbear       # Поиск потенциальных ошибок
            - flake8-comprehensions # Улучшение читаемости list/dict comprehensions
        args: [
            --max-line-length=88,  # Максимальная длина строки
            --extend-ignore=E203   # Игнорируем конфликты с black
        ]

# mypy - статический анализатор типов
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
    -   id: mypy
        exclude: ^(migrations/|.venv/|venv/)
        additional_dependencies:
            - types-setuptools
            - pytest
            - mypy-extensions
            - typing-extensions

# bandit - анализатор безопасности кода
-   repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
    -   id: bandit
        exclude: ^(migrations/|.venv/|venv/|tests/)
        args: ["-ll", "-s", "B311"]  # -ll для low level, -s B311 для пропуска проверки random
