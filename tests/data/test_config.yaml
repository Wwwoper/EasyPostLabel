# Тестовые настройки
app:
  name: "EasyPostLabel-Test"
  version: "1.0.0"

normalizers:
  phone:
    default_country_code: "+7"
  postcode:
    validate: false

delivery:
  postal:
    enabled: true
  pickup:
    enabled: true

# Базовые настройки для тестов
delivery_methods:
  type_column:
    source: "Способ передачи"
    excel_column: "B"
    column_index: 2
    required: true
    validation:
      allowed_values:
        - "Почта"
        - "Центр_Выдачи"

  types:
    Центр_Выдачи:
      title: "Центр выдачи"
      description: "Получение заказа в центре выдачи"
      receiver_types:
        self:
          type: "Лично я"
          name_fields:
            surname: "Фамилия"
            name: "Имя"
        other:
          type: "Другой человек"
          name_fields:
            surname: "Фамилия получателя заказа"
            name: "Имя получателя заказа"

# Настройки Excel для тестов
excel:
  start_row: 2
  sheet_index: 0
  use_columns: true

# Настройки вывода для тестов
output:
  templates:
    pickup_point:
      filename: "labels.xlsx"
      fields:
        - name: "client_name"
          source: ["surname", "name"]
          separator: " "
          title: "ФИО клиента"
        - name: "delivery_method"
          source: "pickup_point"
          title: "Пункт выдачи"

# Настройки стилей для тестов
excel_settings:
  defaults:
    font_name: "Century"
    font_size: 13
    font_bold: false
    spacing_width: 0.5
    row_height: 25.0
  sender:
    name: "Беренёвой Ольги"
    phone: "+79159833971"
  label:
    # Настройки для бирок
    alignment:
      horizontal: "center"
      vertical: "center"
      wrap_text: true

# Настройки нормализации для тестов
normalization:
  phone:
    country_code: "7"
    min_length: 10
    max_length: 11
    patterns:
      - "^\\+?[7|8]?\\d{10}$"
  postcode:
    length: 6
    validate_region: false 