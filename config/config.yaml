version: "1.0"

# Конфигурация способов доставки
delivery_methods:
  # Определение типа доставки
  type_column:
    source: "Способ передачи"
    excel_column: "B"
    column_index: 2
    required: true
    validation:
      allowed_values:
        - "Почта"
        - "Центр_Выдачи"

  types:
    Почта:
      title: "Почтовая доставка"
      description: "Доставка Почтой России"
      required_fields:
        - field: "postal_index"
          source: "Индекс отделения для получения."
          excel_column: "J"
          column_index: 10
        - field: "full_name"
          source: "ФИО полностью"
          excel_column: "K"
          column_index: 11
        - field: "phone"
          source: "Телефон"
          excel_column: "L"
          column_index: 12

    Центр_Выдачи:
      title: "Центр выдачи"
      description: "Получение заказа в центре выдачи"
      receiver_types:
        - "Лично я"
        - "Другой человек"
      required_fields:
        common:
          - field: "pickup_point"
            source: "Список"
            excel_column: "M"
            column_index: 13
            description: "Пункт выдачи заказа"
            required: true
        Лично я:
          - field: "surname"
            source: "Фамилия"
            excel_column: "D"
            column_index: 4
          - field: "name"
            source: "Имя"
            excel_column: "E"
            column_index: 5
        Другой человек:
          - field: "sender_surname"
            source: "Ваша Фамилия"
            excel_column: "F"
            column_index: 6
          - field: "sender_name"
            source: "Ваше Имя"
            excel_column: "G"
            column_index: 7
          - field: "receiver_surname"
            source: "Фамилия получателя заказа"
            excel_column: "H"
            column_index: 8
          - field: "receiver_name"
            source: "Имя получателя заказа"
            excel_column: "I"
            column_index: 9

# Настройки Excel
excel:
  start_row: 2
  sheet_index: 0
  use_columns: true

# Настройки вывода
output:
  templates:
    postal:
      filename: "postal.xlsx"
      fields:
        - name: "recipient_address"
          source: "postal_index"
          title: "Адрес получателя"
        - name: "recipient_name"
          source: "full_name"
          title: "ФИО получателя"
        - name: "weight"
          title: "Вес"
          default: 0
          type: "number"
        - name: "recipient_phone"
          source: "phone"
          title: "Телефон получателя"
        - name: "mail_type"
          title: "Тип почты"
          default: 4
          type: "number"

    pickup_point:
      filename: "labels.xlsx"
      fields:
        - name: "client_name"
          source: ["surname", "name"]
          separator: " "
          title: "ФИО клиента"
        - name: "delivery_method"
          source: "pickup_point"
          title: "Пункт выдачи"

# Общие настройки валидации
validation:
  allow_empty_strings: false
  trim_whitespace: true
  error_messages:
    required: "Поле обязательно для заполнения"
    invalid_format: "Неверный формат данных"
