# Маппинг столбцов
columns:
  receiver_type:
    source: "Кто будет получать заказ"
    required: true
    excel_column: "B"
    column_index: 2
    validation:
      allowed_values: ["Лично я", "Другой человек"]
  
  # Поля для получателя "Лично я"
  self_surname:
    source: "Фамилия"
    excel_column: "C"
    column_index: 3
  
  self_name:
    source: "Имя"
    excel_column: "D"
    column_index: 4
  
  # Поля для получателя "Другой человек"
  other_surname:
    source: "Фамилия получателя заказа"
    excel_column: "G"
    column_index: 7
  
  other_name:
    source: "Имя получателя заказа"
    excel_column: "H"
    column_index: 8
    
  # Дополнительные поля
  delivery_method:
    source: "Список"
    excel_column: "I"
    column_index: 9
    validation:
      postal_keyword: "Почта"  # Ключевое слово для определения почтовой доставки
    transform:
      type: "conditional"
      conditions:
        - when: "contains"
          value: "Почта"
          then: "keep_original"  # Оставляем оригинальное значение для почты
        - when: "default"
          then: "first_word"  # Для остальных берем первое слово до пробела
  
  full_name:
    source: "ФИО полностью"
    excel_column: "J"
    column_index: 10
    required_if:
      field: "delivery_method"
      contains: "Почта"
  
  postal_address:
    source: "только Индекс отделения для получения."
    excel_column: "K"
    column_index: 11
    required_if:
      field: "delivery_method"
      contains: "Почта"
  
  phone:
    source: "Телефон"
    excel_column: "L"
    column_index: 12
    required_if:
      field: "delivery_method"
      contains: "Почта"

# Конфигурация получателей
receivers:
  types:
    self: "Лично я"
    other: "Другой человек"
  fields:
    "Лично я":
      surname_field: "Фамилия"
      name_field: "Имя"
    "Другой человек":
      surname_field: "Фамилия получателя заказа"
      name_field: "Имя получателя заказа"

# Настройки Excel
excel:
  start_row: 2  # Начинаем читать со второй строки (пропускаем заголовок)
  sheet_index: 0  # Индекс первого листа
  use_columns: true    # Использовать буквы столбцов вместо индексов

# Маппинг полей для вывода
output_mapping:
  client_name: "ФИО полностью"
  address: "только Индекс отделения для получения."
  phone: "Телефон"
  delivery_method: "Список"

# Настройки вывода
output:
  postal:
    filename: "postal.xlsx"
    columns:
      - client_name
      - address
      - phone
  
  alternative:
    filename: "labels.xlsx"
    columns:
      - client_name
      - delivery_method
      - address
      - phone

# Общие настройки валидации
validation:
  allow_empty_strings: false
  trim_whitespace: true 